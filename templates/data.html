{% extends "base.html" %}
{% block content %}

<h5 class="mb-3 text-secondary">Data Table</h5>

<table class="table table-striped table-sm align-middle">
    <thead class="table-light">
        <tr>
            {% for c in columns %}
            <th>{{ c }}</th>
            {% endfor %}
        </tr>
    </thead>
    <tbody>
        {% for r in rows %}
        <tr>
            {% for v in r %}
            <td>{{ v }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
    </tbody>
</table>

<nav class="mt-3">
    <a class="btn btn-sm btn-outline-primary" href="?page={{ page-1 if page>1 else 1 }}">Prev</a>
    <span class="mx-2">Page {{ page }}</span>
    <a class="btn btn-sm btn-outline-primary" href="?page={{ page+1 if page*per_page < total else page }}">Next</a>
</nav>

{% endblock %}
