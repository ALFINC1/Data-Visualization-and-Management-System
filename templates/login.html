{% extends "base.html" %}
{% block content %}

<div class="card shadow-sm border-0">
  <div class="card-body p-4">

    <!-- Title -->
    <div class="text-center mb-3">
      <div class="d-inline-flex align-items-center justify-content-center rounded-circle"
           style="width:52px;height:52px;background:#3f6ad8;color:#fff;">
        <i class="bi bi-bar-chart-line-fill fs-4"></i>
      </div>

      <h4 class="mt-3 mb-1 fw-semibold">Welcome!</h4>
      <div class="small text-muted">
        Data Visualization &amp; Management System
      </div>
    </div>

    <!-- Login Form -->
    <form method="post" class="mt-3" autocomplete="on">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input
            class="form-control"
            name="username"
            required
            autocomplete="username"
            placeholder="Enter your username"
          >
        </div>
      </div>

      <div class="mb-2">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
          <input
            id="passwordInput"
            class="form-control"
            type="password"
            name="password"
            required
            autocomplete="current-password"
            placeholder="Enter your password"
          >
          <button class="btn btn-outline-secondary" type="button" id="togglePasswordBtn" aria-label="Show password">
            <i class="bi bi-eye"></i>
          </button>
        </div>

        <div id="capsWarning" class="small text-warning mt-2 d-none">
          <i class="bi bi-exclamation-triangle"></i> Caps Lock is ON
        </div>
      </div>

      <div class="d-flex align-items-center justify-content-between mb-3 mt-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" value="1" id="rememberMe" name="remember">
          <label class="form-check-label small" for="rememberMe">Remember me</label>
        </div>

        <a href="#" class="small text-decoration-none" onclick="return false;" title="Not implemented">
          Forgot password?
        </a>
      </div>

      <button class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-1"></i> Login
      </button>
    </form>

    </div>

  </div>
</div>

<script>
(function () {
  const pwd = document.getElementById("passwordInput");
  const btn = document.getElementById("togglePasswordBtn");
  const caps = document.getElementById("capsWarning");

  if (btn && pwd) {
    btn.addEventListener("click", () => {
      const isHidden = pwd.type === "password";
      pwd.type = isHidden ? "text" : "password";
      btn.innerHTML = isHidden ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
      btn.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
    });

    pwd.addEventListener("keyup", (e) => {
      if (!caps) return;
      const isCaps = e.getModifierState && e.getModifierState("CapsLock");
      caps.classList.toggle("d-none", !isCaps);
    });
  }

  const copyBtn = document.getElementById("copyDemoBtn");
  if (copyBtn) {
    copyBtn.addEventListener("click", async () => {
      const text = "admin / admin123";
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.innerHTML = '<i class="bi bi-check2"></i> Copied';
        setTimeout(() => copyBtn.innerHTML = '<i class="bi bi-clipboard"></i> Copy', 1200);
      } catch {
        prompt("Copy demo credentials:", text);
      }
    });
  }
})();
</script>

{% endblock %}
