{% extends "base.html" %}
{% block content %}

<h5 class="mb-3 fw-semibold text-secondary">{{ title }}</h5>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% else %}
<div class="card">
    <div class="card-body text-center">
        <img src="{{ pie_url }}" class="img-fluid" alt="Pie Chart">
    </div>
</div>
{% endif %}

{% endblock %}
