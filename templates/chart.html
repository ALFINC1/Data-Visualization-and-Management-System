{% extends "base.html" %}
{% block content %}

<h5 class="mb-3 fw-semibold text-secondary">{{ title }}</h5>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% else %}

<div class="card mb-4">
    <div class="card-body text-center">
        <img src="{{ chart_url }}" class="img-fluid" alt="Chart">
    </div>
</div>

{% if meta is defined and meta %}
<div class="card bg-light">
    <div class="card-body">
        <h6 class="fw-semibold mb-2">Chart Summary</h6>
        <ul class="small ps-3 mb-0">
            {% for k, v in meta.items() %}
            <li>
                <strong>{{ k | replace('_',' ') | title }}:</strong> {{ v }}
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endif %}

{% endif %}
{% endblock %}
