<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "DVMS" }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
            margin: 0;
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 56px); /* navbar height */
        }

        .sidebar {
            background-color: #2f4b7c;
            width: 250px;
            transition: width 0.3s ease;
            overflow: hidden;
        }

        .sidebar .nav-link {
            color: #e1e5f2;
        }

        .sidebar .nav-link.active,
        .sidebar .nav-link:hover {
            background-color: #3f6ad8;
            color: #fff;
        }

        .sidebar-collapsed .sidebar {
            width: 0;
        }

        .content {
            flex: 1;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .dvms-footer {
            background-color: #263a63;
            color: #d6dbeb;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .dvms-footer .footer-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 6px;
        }

        .dvms-footer .footer-text {
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        .dvms-footer .footer-icons a {
            color: #d6dbeb;
            margin: 0 10px;
            font-size: 18px;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .dvms-footer .footer-icons a:hover {
            color: #4c79ff;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid d-flex align-items-center">
        <button class="btn btn-outline-light me-3" onclick="toggleSidebar()">☰</button>
        <span class="navbar-brand mb-0">DVMS Analytics</span>
    </div>
</nav>

<div class="layout">
    <aside class="sidebar p-3">
        <ul class="nav nav-pills flex-column gap-2">
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'bar_chart' %}active{% endif %}" href="{{ url_for('bar_chart') }}">Bar Chart</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'line_chart' %}active{% endif %}" href="{{ url_for('line_chart') }}">Line Chart</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'scatter_chart' %}active{% endif %}" href="{{ url_for('scatter_chart') }}">Scatter</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'heatmap_chart' %}active{% endif %}" href="{{ url_for('heatmap_chart') }}">Heatmap</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'pie' %}active{% endif %}" href="{{ url_for('pie') }}">Pie Chart</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'data' %}active{% endif %}" href="{{ url_for('data') }}">Data</a>
            </li>
        </ul>
    </aside>

    <main class="content">
        {% block content %}{% endblock %}
    </main>
</div>

<footer class="dvms-footer">
    <div class="footer-inner">
        <span class="footer-text">
            © <span id="year"></span> Fadil Ahmed. All rights reserved.
        </span>
        <div class="footer-icons">
            <a href="https://www.linkedin.com/in/fadilahmed123" target="_blank"><i class="bi bi-linkedin"></i></a>
            <a href="https://github.com/ALFINC1" target="_blank"><i class="bi bi-github"></i></a>
            <a href="https://t.me/ALFINC1" target="_blank"><i class="bi bi-telegram"></i></a>
        </div>
    </div>
</footer>

<script>
    function toggleSidebar() {
        document.body.classList.toggle("sidebar-collapsed");
    }
    document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
