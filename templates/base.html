<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "DNA‑DVMS" }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        /* Sidebar styling */
        .sidebar {
            background-color: #2f4b7c;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        .sidebar .nav-link {
            color: #e1e5f2;
        }

        .sidebar .nav-link.active {
            background-color: #3f6ad8;
            color: #fff;
        }

        /* Collapsed sidebar */
        .sidebar-collapsed .sidebar {
            margin-left: -250px;
        }

        .sidebar-collapsed main {
            margin-left: 0;
        }
    </style>
</head>

<body>

<!-- TOP NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid d-flex align-items-center">
        
        <!-- ✅ TOGGLE BUTTON -->
        <button class="btn btn-outline-light me-3" onclick="toggleSidebar()">
            ☰
        </button>

        <span class="navbar-brand mb-0">DVMS Analytics</span>
    </div>
</nav>

<!-- MAIN LAYOUT -->
<div class="container-fluid" id="layout">
    <div class="row">

        <!-- SIDEBAR -->
        <aside class="col-md-2 sidebar p-3" id="sidebar">
            <h6 class="text-uppercase text-muted mb-3">Navigation</h6>

            <ul class="nav nav-pills flex-column gap-2">
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
                       href="{{ url_for('index') }}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'bar_chart' %}active{% endif %}"
                       href="{{ url_for('bar_chart') }}">Bar Chart</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'line_chart' %}active{% endif %}"
                       href="{{ url_for('line_chart') }}">Line Chart</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'scatter_chart' %}active{% endif %}"
                       href="{{ url_for('scatter_chart') }}">Scatter</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'heatmap_chart' %}active{% endif %}"
                       href="{{ url_for('heatmap_chart') }}">Heatmap</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'pie' %}active{% endif %}"
                       href="{{ url_for('pie') }}">Pie Chart</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'data' %}active{% endif %}"
                       href="{{ url_for('data') }}">Data</a>
                </li>
            </ul>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="col-md-10 p-4">
            {% block content %}{% endblock %}
        </main>

    </div>
</div>


<!-- ✅ SIDEBAR TOGGLE SCRIPT -->
<script>
    function toggleSidebar() {
        document.body.classList.toggle("sidebar-collapsed");
    }
</script>

</body>
</html>
