{% extends "base.html" %}
{% block content %}

<h5 class="mb-3 text-secondary">Analytics Dashboard</h5>

{% if error %}
  <div class="alert alert-danger">{{ error }}</div>
{% endif %}

<div class="row g-3">

    <div class="col-md-4">
        <div class="card">
            <div class="card-header">Bar Chart</div>
            <div class="card-body text-center">
                <img src="{{ bar_url }}" class="img-fluid" alt="Bar Chart">
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card">
            <div class="card-header">Line Chart</div>
            <div class="card-body text-center">
                <img src="{{ line_url }}" class="img-fluid" alt="Line Chart">
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card">
            <div class="card-header">Pie Chart</div>
            <div class="card-body text-center">
                <img src="{{ pie_url }}" class="img-fluid" alt="Pie Chart">
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card">
            <div class="card-header">Scatter Plot</div>
            <div class="card-body text-center">
                <img src="{{ scatter_url }}" class="img-fluid" alt="Scatter Plot">
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card">
            <div class="card-header">Heatmap</div>
            <div class="card-body text-center">
                <img src="{{ heatmap_url }}" class="img-fluid" alt="Heatmap">
            </div>
        </div>
    </div>

</div>

{% endblock %}
